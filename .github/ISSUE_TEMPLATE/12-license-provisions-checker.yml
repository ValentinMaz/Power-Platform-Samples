name: 🥸 [License Provisions Checker] Bug, question or feature ask report
description: File a Bug, question or feature ask report for the License Provisions Checker
title: "[License Provisions Checker] TOPIC TITLE"
labels: ["License Provisions Checker"]
body:
- type: dropdown
  id: issue-type
  attributes:
    label: What kind of issue is this?
    options:
      - Bug
      - Question
      - Feature request
  validations:
    required: true
- type: textarea
  attributes:
    label: Describe your bug, question or feature ask.
    description: A concise description of what issue you are experiencing, what question you have or what feature you would like to see.
  validations:
    required: true
- type: input
  id: version
  attributes:
    label: What solution version are you using? (if relevant)
    placeholder: "2024.11.02.1"
